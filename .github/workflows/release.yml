name: Build And Release

on:
  push:
    tags:
      - "v*"
      - "version-*"
      - "latest-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, such as v1.1.0"
        required: true
      title:
        description: "Release title"
        required: false
        default: "Sana-Chan Release"

permissions:
  contents: write

jobs:
  python-check:
    name: Python Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python files
        run: |
          python -m py_compile \
            bot.py \
            dashboard.py \
            dashboard_account_templates.py \
            dashboard_admin_roles.py \
            dashboard_shell_assets.py \
            dashboard_sidebar.py \
            config.py \
            database_backend.py \
            database_migrations.py \
            observability.py \
            scripts/migrate_database.py \
            scripts/export_sqlite_to_postgres.py \
            scripts/release_readiness.py
      - name: Backend release readiness
        run: python scripts/release_readiness.py
      - name: Runtime smoke tests
        run: |
          python - <<'PY'
          import sqlite3
          import tempfile
          from pathlib import Path

          import bot
          import dashboard
          from database_migrations import DATABASE_SCHEMA_VERSION, apply_database_migrations

          names = {command.name for command in bot.tree.get_commands()}
          required = {"sdac", "submit", "guess", "hint"}
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"Missing simplified slash command(s): {missing}")
          hidden = {"setup", "sdacpanic", "diagnose", "supportbundle"} & names
          if hidden:
              raise SystemExit(f"Legacy slash command(s) should be behind /sdac: {sorted(hidden)}")

          with tempfile.TemporaryDirectory() as temp_dir:
              db_path = Path(temp_dir) / "sdac.db"
              connection = sqlite3.connect(db_path)
              connection.row_factory = sqlite3.Row
              apply_database_migrations(connection)
              version = connection.execute("SELECT version FROM schema_version WHERE id = 1").fetchone()[0]
              if version != DATABASE_SCHEMA_VERSION:
                  raise SystemExit(f"Schema version mismatch: {version} != {DATABASE_SCHEMA_VERSION}")

          app = dashboard.app
          client = app.test_client()
          with client.session_transaction() as session:
              session["sdac_admin"] = True
              session["sdac_admin_role"] = "bot_owner"
              session["sdac_admin_username"] = "baytae"
          for path in (
              "/health",
              "/admin/settings?key=ImTheBestAdmin",
              "/admin/maintenance?key=ImTheBestAdmin",
              "/admin/media?key=ImTheBestAdmin",
              "/admin/analytics?key=ImTheBestAdmin",
              "/admin/production-health?key=ImTheBestAdmin",
              "/stats",
          ):
              response = client.get(path)
              if response.status_code != 200:
                  raise SystemExit(f"{path} returned {response.status_code}")
          PY
      - name: PostgreSQL export tool help
        run: python scripts/export_sqlite_to_postgres.py --help

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: python-check
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sdac-bot:test .

  build-installers:
    name: Build Installers
    runs-on: windows-latest
    needs: [python-check, docker-build]
    steps:
      - uses: actions/checkout@v4
      - name: Check Windows updater help
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\update_from_github_windows.ps1 -Help
      - name: Build single-file installers
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools\build_installers.ps1
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdac-installers
          path: |
            dist/SDAC-Bot-Linux-Installer.sh
            dist/SDAC-Bot-Windows-Installer.exe
            dist/Sana-Chan-Ubuntu-Update.sh
            dist/SDAC-Bot-Windows-Update.ps1
            dist/sana-update
            dist/sanachan-update
            dist/Sana-Chan-App-Source.zip


  build-android-app:
    name: Build Android App APK
    runs-on: ubuntu-latest
    needs: python-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/sdac-official-app/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Install app dependencies
        working-directory: apps/sdac-official-app
        run: npm ci
      - name: Build app web shell
        working-directory: apps/sdac-official-app
        run: npm run build
      - name: Sync Capacitor Android project
        working-directory: apps/sdac-official-app
        run: npx cap sync android
      - name: Pin Android Java compatibility
        shell: pwsh
        run: |
          $path = "apps/sdac-official-app/android/app/capacitor.build.gradle"
          $text = Get-Content -LiteralPath $path -Raw
          $text = $text -replace "JavaVersion.VERSION_21", "JavaVersion.VERSION_17"
          Set-Content -LiteralPath $path -Value $text -NoNewline
      - name: Install Android SDK platform
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          fi
          "$SDKMANAGER" --version
          yes | "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"
      - name: Build debug APK
        working-directory: apps/sdac-official-app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Prepare APK artifacts
        run: |
          set -Eeuo pipefail
          mkdir -p dist
          cp apps/sdac-official-app/android/app/build/outputs/apk/debug/app-debug.apk dist/Sana-Chan-Android-Debug.apk
          (cd dist && sha256sum Sana-Chan-Android-Debug.apk > Sana-Chan-Android-Debug.apk.sha256)
      - name: Upload Android app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdac-app-android
          path: |
            dist/Sana-Chan-Android-Debug.apk
            dist/Sana-Chan-Android-Debug.apk.sha256

  linux-installer-smoke-test:
    name: Linux Installer Smoke Test
    runs-on: ubuntu-latest
    needs: build-installers
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdac-installers
          path: artifacts
      - name: Verify Linux line endings and installer extraction
        run: |
          set -Eeuo pipefail
          if grep -q $'\r' artifacts/SDAC-Bot-Linux-Installer.sh; then
            echo "Linux installer contains CRLF line endings."
            exit 1
          fi
          if grep -q $'\r' artifacts/Sana-Chan-Ubuntu-Update.sh; then
            echo "Ubuntu updater contains CRLF line endings."
            exit 1
          fi
          if grep -q $'\r' artifacts/sana-update; then
            echo "sana-update contains CRLF line endings."
            exit 1
          fi
          if grep -q $'\r' artifacts/sanachan-update; then
            echo "sanachan-update contains CRLF line endings."
            exit 1
          fi
          bash -n artifacts/Sana-Chan-Ubuntu-Update.sh
          bash -n artifacts/sana-update
          bash -n artifacts/sanachan-update
          chmod +x artifacts/SDAC-Bot-Linux-Installer.sh
          export SDAC_APP_DIR="$RUNNER_TEMP/sdac-smoke"
          export SDAC_APP_USER="$(id -un)"
          export SDAC_ENV_FILE="$RUNNER_TEMP/sdac.env"
          export SDAC_SKIP_SERVICES=1
          artifacts/SDAC-Bot-Linux-Installer.sh
          find "$SDAC_APP_DIR" -type f \
            \( -name "*.sh" -o -name "*.py" -o -name "*.template" -o -name "*.conf" -o -name "*.md" -o -name "*.yml" -o -name "*.json" \) \
            -print0 | xargs -0 grep -l $'\r' > "$RUNNER_TEMP/crlf-files.txt" || true
          cat "$RUNNER_TEMP/crlf-files.txt"
          if [[ -s "$RUNNER_TEMP/crlf-files.txt" ]]; then
            echo "Extracted Linux payload contains CRLF files."
            exit 1
          fi

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [linux-installer-smoke-test, build-android-app]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: sdac-installers
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: sdac-app-android
          path: artifacts
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_TITLE: ${{ inputs.title }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -Eeuo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
            TITLE="${INPUT_TITLE:-Sana-Chan Release}"
            if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              git tag "$TAG"
              git push origin "$TAG"
            fi
          else
            TAG="$REF_NAME"
            TITLE="$REF_NAME"
          fi

          NOTES_FILE="$(mktemp)"
          if [[ -f RELEASE.md ]]; then
            awk '
              /^# / {
                if (seen) { exit }
                seen=1
              }
              seen { print }
            ' RELEASE.md > "$NOTES_FILE"
          fi
          if [[ ! -s "$NOTES_FILE" ]]; then
            echo "Automated Sana-Chan Release." > "$NOTES_FILE"
          fi
          NOTES_TITLE="$(grep -m1 '^# ' "$NOTES_FILE" | sed 's/^# //')"
          NOTES_VERSION="$(printf '%s\n' "$NOTES_TITLE" | grep -Eo '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -n1 || true)"
          if [[ "$TAG" == "latest-experimental" && -n "$NOTES_VERSION" ]]; then
            TITLE="Latest Experimental ($NOTES_VERSION)"
          elif [[ "$TAG" == "latest-official" && -n "$NOTES_VERSION" ]]; then
            TITLE="Latest Official ($NOTES_VERSION)"
          elif [[ -z "${INPUT_TITLE:-}" && -n "$NOTES_TITLE" ]]; then
            TITLE="$NOTES_TITLE"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file "$NOTES_FILE"
            gh release upload "$TAG" artifacts/* --clobber
          else
            gh release create "$TAG" artifacts/* --title "$TITLE" --notes-file "$NOTES_FILE"
          fi
