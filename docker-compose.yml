services:
  dashboard:
    build: .
    command: gunicorn --workers 2 --bind 0.0.0.0:5000 dashboard:app
    env_file:
      - .env
    environment:
      SDAC_CONFIG_FILE: /data/config.json
      SDAC_DB_FILE: /data/sdac.db
      SDAC_MEDIA_DIR: /data/media
      SDAC_BACKUP_DIR: /data/backups
      SDAC_BOT_STATUS_FILE: /data/bot_status.json
    ports:
      - "5000:5000"
    volumes:
      - sdac-data:/data
    restart: unless-stopped

  bot:
    build: .
    command: python bot.py
    env_file:
      - .env
    environment:
      SDAC_CONFIG_FILE: /data/config.json
      SDAC_DB_FILE: /data/sdac.db
      SDAC_MEDIA_DIR: /data/media
      SDAC_BACKUP_DIR: /data/backups
      SDAC_BOT_STATUS_FILE: /data/bot_status.json
    volumes:
      - sdac-data:/data
    restart: unless-stopped
    depends_on:
      - dashboard

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    environment:
      POSTGRES_DB: sdac
      POSTGRES_USER: sdac
      POSTGRES_PASSWORD: sdac-change-me
    ports:
      - "5432:5432"
    volumes:
      - sdac-postgres:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  sdac-data:
  sdac-postgres:
